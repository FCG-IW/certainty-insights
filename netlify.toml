# Netlify configuration for FCG React frontend

[build]
command = "npm run build"
publish = "dist"

# Environment variables for the build
# Set these in Netlify UI: Site Settings > Build & Deploy > Environment
# VITE_WORDPRESS_URL should point to your Turbify WordPress site
# Example: https://your-turbify-domain.com

[[redirects]]
from = "/*"
to = "/index.html"
status = 200
condition = { Query = { _escaped_fragment_ = ":page" } }

[[redirects]]
from = "/*"
to = "/index.html"
status = 200

# Cache settings
[[headers]]
for = "/*"
[headers.values]
Cache-Control = "public, max-age=3600, s-maxage=3600"

[[headers]]
for = "/index.html"
[headers.values]
Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
for = "/assets/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

# Security headers
[[headers]]
for = "/*"
[headers.values]
X-Content-Type-Options = "nosniff"
X-Frame-Options = "SAMEORIGIN"
X-XSS-Protection = "1; mode=block"
Referrer-Policy = "strict-origin-when-cross-origin"
